<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- ─────────────────────────────────────────────────────────── -->
  <!-- PRIMARY META                                                 -->
  <!-- ─────────────────────────────────────────────────────────── -->
  <title>coronin — Physical AI for skilled trades</title>
  <meta name="description" content="AI was built for office workers. coronin is built for skilled trades. Computer vision and multimodal AI for real work in real conditions."/>
  <meta name="author" content="coronin"/>
  <link rel="canonical" href="https://coronin.ai/"/>

  <!-- ─────────────────────────────────────────────────────────── -->
  <!-- THEME                                                        -->
  <!-- ─────────────────────────────────────────────────────────── -->
  <meta name="theme-color" content="#000000"/>
  <meta name="color-scheme" content="dark"/>
  <meta name="msapplication-TileColor" content="#000000"/>

  <!-- ─────────────────────────────────────────────────────────── -->
  <!-- FAVICONS & APP ICONS                                         -->
  <!-- ─────────────────────────────────────────────────────────── -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico"/>
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png"/>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png"/>
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png"/>
  <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#000000"/>
  <link rel="manifest" href="/site.webmanifest"/>

  <!-- ─────────────────────────────────────────────────────────── -->
  <!-- OPEN GRAPH (Slack, LinkedIn, iMessage, Facebook)             -->
  <!-- ─────────────────────────────────────────────────────────── -->
  <meta property="og:type" content="website"/>
  <meta property="og:site_name" content="coronin"/>
  <meta property="og:url" content="https://coronin.ai/"/>
  <meta property="og:title" content="coronin — Physical AI for skilled trades"/>
  <meta property="og:description" content="AI was built for office workers. coronin is built for skilled trades. Computer vision and multimodal AI for real work in real conditions."/>
  <meta property="og:image" content="https://coronin.ai/og-image-1200x630.png"/>
  <meta property="og:image:width" content="1200"/>
  <meta property="og:image:height" content="630"/>
  <meta property="og:image:alt" content="coronin — Physical AI for skilled trades"/>
  <meta property="og:locale" content="en_US"/>

  <!-- ─────────────────────────────────────────────────────────── -->
  <!-- X / TWITTER CARD                                             -->
  <!-- ─────────────────────────────────────────────────────────── -->
  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="twitter:url" content="https://coronin.ai/"/>
  <meta name="twitter:title" content="coronin — Physical AI for skilled trades"/>
  <meta name="twitter:description" content="AI was built for office workers. coronin is built for skilled trades. Computer vision and multimodal AI for real work in real conditions."/>
  <meta name="twitter:image" content="https://coronin.ai/twitter-card-1200x675.png"/>
  <meta name="twitter:image:alt" content="coronin — Physical AI for skilled trades"/>

  <!-- ─────────────────────────────────────────────────────────── -->
  <!-- STRUCTURED DATA (Organization schema for Google)             -->
  <!-- ─────────────────────────────────────────────────────────── -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "coronin",
    "url": "https://coronin.ai/",
    "logo": "https://coronin.ai/android-chrome-512x512.png",
    "description": "AI was built for office workers. coronin is built for skilled trades. Computer vision and multimodal AI for real work in real conditions.",
    "email": "hello@coronin.ai",
    "foundingDate": "2026",
    "slogan": "Physical AI for skilled trades"
  }
  </script>

  <!-- ─────────────────────────────────────────────────────────── -->
  <!-- FONTS                                                        -->
  <!-- ─────────────────────────────────────────────────────────── -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=DM+Mono:wght@300&display=swap" rel="stylesheet"/>

  <!-- Three.js r160 via ES module importmap -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <style>
    /* ══════════════════════════════════════════════════════════════
       Responsive two-column landing page
       Mobile: stacked (visual on top, content below, scrolls)
       ≥ 640px: looser spacing, form row back to side-by-side
       ≥ 1024px: original two-column desktop layout, no scroll
       ══════════════════════════════════════════════════════════════ */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: #000; color: #fff;
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    body { overflow-x: hidden; }

    .layout { display: flex; flex-direction: column; min-height: 100vh; }

    /* ── LEFT / VISUAL PANEL ───────────────────────────────────── */
    .left {
      position: relative; overflow: hidden;
      height: 45vh; min-height: 300px; max-height: 480px;
      flex-shrink: 0;
    }
    .big-word {
      position: absolute; left: 24px; bottom: 24px; z-index: 1;
      font-family: 'Outfit', sans-serif; font-weight: 700;
      font-size: clamp(52px, 14vw, 88px);
      letter-spacing: -2px; line-height: 0.9;
      color: #fff; pointer-events: none; user-select: none;
    }
    #three-canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%; display: block;
    }
    #load-msg {
      position: absolute; bottom: 50%; left: 50%;
      transform: translate(-50%, 50%);
      font-family: 'DM Mono', monospace; font-size: 10px;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: rgba(255,255,255,0.18); pointer-events: none; z-index: 3;
    }

    /* ── RIGHT / CONTENT PANEL ─────────────────────────────────── */
    .right {
      display: flex; flex-direction: column;
      padding: 40px 24px 48px;
      border-top: 1px solid rgba(255,255,255,0.07);
      position: relative; z-index: 10; flex: 1;
    }
    .logo {
      font-family: 'Outfit', sans-serif; font-weight: 600;
      font-size: 20px; letter-spacing: -0.5px;
      color: #fff; text-decoration: none;
      margin-bottom: 32px; display: block;
    }
    .slogan {
      font-family: 'Outfit', sans-serif; font-weight: 600;
      font-size: clamp(26px, 6vw, 36px); letter-spacing: -0.5px;
      line-height: 1.15; color: #fff; margin-bottom: 16px;
    }
    .hook {
      font-family: 'Outfit', sans-serif; font-weight: 300;
      font-size: 16px; line-height: 1.65;
      color: rgba(255,255,255,0.65); margin-bottom: 8px; max-width: 340px;
    }
    .launch-note {
      font-family: 'DM Mono', monospace; font-weight: 300;
      font-size: 12px; letter-spacing: 0.06em;
      color: rgba(255,255,255,0.38); margin-bottom: 32px;
    }
    .form-block { display: flex; flex-direction: column; max-width: 360px; margin-bottom: 32px; }
    .field-label {
      font-family: 'DM Mono', monospace; font-weight: 300;
      font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
      color: rgba(255,255,255,0.38); margin-bottom: 10px;
    }
    .input-row { display: flex; flex-direction: column; gap: 10px; }
    .email-input {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.2); outline: none;
      padding: 14px 18px;
      font-family: 'DM Mono', monospace; font-weight: 300;
      font-size: 16px; /* 16px avoids iOS zoom-on-focus */
      color: #fff; transition: border-color 0.2s; width: 100%;
    }
    .email-input::placeholder { color: rgba(255,255,255,0.3); }
    .email-input:focus { border-color: rgba(255,255,255,0.5); }
    .notify-btn {
      background: #fff; color: #000; border: 1px solid #fff;
      padding: 14px 24px;
      font-family: 'Outfit', sans-serif; font-weight: 700;
      font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase;
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
      transition: background 0.2s, color 0.2s; width: 100%;
    }
    .notify-btn:hover { background: transparent; color: #fff; }
    .contact {
      font-family: 'DM Mono', monospace; font-weight: 300;
      font-size: 13px; letter-spacing: 0.1em;
      color: rgba(255,255,255,0.38); text-decoration: none;
      transition: color 0.2s;
    }
    .contact:hover { color: #fff; }

    /* ── TABLET ≥ 640px ────────────────────────────────────────── */
    @media (min-width: 640px) {
      .left { height: 50vh; min-height: 380px; }
      .big-word {
        font-size: clamp(72px, 10vw, 120px);
        letter-spacing: -3px;
        left: 40px; bottom: 40px;
      }
      .right { padding: 56px 40px; }
      .input-row { flex-direction: row; }
      .email-input { flex: 1; width: auto; font-size: 14px; }
      .notify-btn { width: auto; }
    }

    /* ── DESKTOP ≥ 1024px (original two-column layout) ─────────── */
    @media (min-width: 1024px) {
      .layout {
        display: grid;
        grid-template-columns: 58% 42%;
        min-height: 100vh;
      }
      .left {
        height: 100vh; min-height: 0; max-height: 100vh;
      }
      .big-word {
        font-size: clamp(80px, 12vw, 160px);
        letter-spacing: -4px;
        left: 48px; bottom: 72px;
      }
      .right {
        padding: 64px 56px 64px 40px;
        justify-content: center;
        border-left: 1px solid rgba(255,255,255,0.07);
        border-top: none;
        min-height: 100vh;
      }
      .logo { font-size: 22px; margin-bottom: 56px; }
      .slogan { font-size: clamp(26px, 2.6vw, 38px); margin-bottom: 20px; }
      .hook { font-size: 17px; line-height: 1.75; }
      .launch-note { font-size: 13px; margin-bottom: 48px; }
      .form-block { margin-bottom: 48px; }
    }

    /* ── DESKTOP + TALL VIEWPORT: lock to one screen (original intent) ── */
    /* Only engage the no-scroll hero when we actually have the room. */
    /* Short laptops (≤ 719px effective height) fall through to natural scroll. */
    @media (min-width: 1024px) and (min-height: 720px) {
      html, body { height: 100%; overflow: hidden; }
      .layout { height: 100vh; min-height: 0; }
    }
  </style>
</head>

<body>

<div class="layout">
  <div class="left">
    <div class="big-word">coronin</div>
    <canvas id="three-canvas"></canvas>
    <p id="load-msg">Loading...</p>
  </div>

  <div class="right">
    <a class="logo" href="/">coronin</a>
    <h1 class="slogan">Physical AI<br/>for skilled trades</h1>
    <p class="hook">The first platform built for the people who fix the world.</p>
    <p class="launch-note">Launching soon — be among the first to know.</p>
    <div class="form-block" id="form-block">
      <p class="field-label">Your email</p>
      <div class="input-row">
        <input class="email-input" id="email-input" type="email" placeholder="name@company.com"/>
        <button class="notify-btn" type="button" id="notify-btn">Notify Me</button>
      </div>
    </div>
    <a class="contact" href="mailto:hello@coronin.ai">hello@coronin.ai</a>
  </div>
</div>

<!-- Form handler (no module needed) -->
<script>
document.getElementById('notify-btn').addEventListener('click', () => {
  const email = document.getElementById('email-input').value;
  if (!email || !email.includes('@')) return;
  fetch('https://formspree.io/f/YOUR_FORM_ID', {
    method: 'POST',
    body: JSON.stringify({ email }),
    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' }
  }).then(r => {
    if (r.ok) document.getElementById('form-block').innerHTML =
      '<p style="font-family:DM Mono,monospace;font-size:12px;color:rgba(255,255,255,0.6);letter-spacing:0.08em;">✓ You\'re on the list.</p>';
  }).catch(() => {});
});
</script>

</body>
</html>
