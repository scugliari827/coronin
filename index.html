  <style>
    /* ══════════════════════════════════════════════════════════════
       Responsive two-column landing page

       ≥ 640px: looser spacing, form row back to side-by-side
       ≥ 1024px: original two-column desktop layout, no scroll

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: #000; color: #fff;
      font-family: 'Outfit', sans-serif;

    .layout { display: flex; flex-direction: column; min-height: 100vh; }

      height: 45vh; min-height: 300px; max-height: 480px;
      flex-shrink: 0;
    }
    .big-word {

      font-family: 'Outfit', sans-serif; font-weight: 700;

      letter-spacing: -2px; line-height: 0.9;
      color: #fff; pointer-events: none; user-select: none;
    }
    #three-canvas {

<!-- Form handler (no module needed) -->
<script>
document.getElementById('notify-btn').addEventListener('click', () => {
  const email = document.getElementById('email-input').value;
  if (!email || !email.includes('@')) return;
  fetch('https://formspree.io/f/YOUR_FORM_ID', {
    method: 'POST',
    body: JSON.stringify({ email }),
    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' }
  }).then(r => {
    if (r.ok) document.getElementById('form-block').innerHTML =
      '<p style="font-family:DM Mono,monospace;font-size:12px;color:rgba(255,255,255,0.6);letter-spacing:0.08em;">✓ You\'re on the list.</p>';
  }).catch(() => {});
});
</script>

<!-- Three.js iridescent glass torus knot -->
<script type="module">
import * as THREE from 'three';

const canvas = document.getElementById('three-canvas');
const panel  = canvas.parentElement;

// ── RENDERER ──────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({
  canvas,
  antialias: true,
  alpha: true,
  powerPreference: 'high-performance',
});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping         = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.6;
renderer.outputColorSpace    = THREE.SRGBColorSpace;

// ── CAMERA & SCENE ────────────────────────────────────────────────────────
const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(32, 1, 0.1, 200);
camera.position.set(0, 0, 9);

// ── PROCEDURAL ENVIRONMENT MAP ────────────────────────────────────────────
// Coloured gradient canvas → equirectangular env texture.
// Gives the glass something rich to refract and reflect.
const envCanvas = Object.assign(document.createElement('canvas'), { width: 1024, height: 512 });
const ec = envCanvas.getContext('2d');

const bg = ec.createLinearGradient(0, 0, 0, 512);
bg.addColorStop(0,   '#04001a');
bg.addColorStop(0.5, '#010010');
bg.addColorStop(1,   '#010018');
ec.fillStyle = bg; ec.fillRect(0, 0, 1024, 512);

[
  [120,  80, 260, '#6600ff', 0.55],
  [420, 160, 200, '#ff2266', 0.45],
  [700, 100, 220, '#00ccff', 0.40],
  [900, 380, 180, '#ff7700', 0.38],
  [260, 400, 200, '#00ff88', 0.35],
  [600, 320, 160, '#cc00ff', 0.40],
].forEach(([x, y, r, hex, a]) => {
  const g = ec.createRadialGradient(x, y, 0, x, y, r);
  const rgb = hex.replace('#','').match(/.{2}/g).map(h=>parseInt(h,16));
  g.addColorStop(0,   `rgba(${rgb},${a})`);
  g.addColorStop(1,   'rgba(0,0,0,0)');
  ec.fillStyle = g; ec.fillRect(0, 0, 1024, 512);
});

const envTex = new THREE.CanvasTexture(envCanvas);
envTex.mapping = THREE.EquirectangularReflectionMapping;
envTex.colorSpace = THREE.SRGBColorSpace;

const pmrem   = new THREE.PMREMGenerator(renderer);
const envMap  = pmrem.fromEquirectangular(envTex).texture;
scene.environment = envMap;
scene.background  = new THREE.Color(0x000000);
pmrem.dispose();
envTex.dispose();

// ── GLASS MATERIAL (iridescent) ───────────────────────────────────────────
const glassMat = new THREE.MeshPhysicalMaterial({
  transmission:              0.96,
  roughness:                 0.02,
  metalness:                 0.0,
  ior:                       1.75,
  thickness:                 1.4,
  transparent:               true,
  color:                     new THREE.Color(0xffffff),
  envMap,
  envMapIntensity:           2.0,
  iridescence:               1.0,
  iridescenceIOR:            1.4,
  iridescenceThicknessRange: [80, 700],
  clearcoat:                 1.0,
  clearcoatRoughness:        0.03,
  side:                      THREE.DoubleSide,
});

// ── LIGHTS ────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x0a0820, 2));

const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight.position.set(4, 8, 6);
scene.add(dirLight);

// Orbiting coloured point lights — push different colours into the glass
const orbDefs = [
  { r: 4.0, spd:  0.72, y:  1.8, ph: 0.0 },
  { r: 3.5, spd: -0.55, y: -1.2, ph: 2.2 },
  { r: 4.8, spd:  0.40, y:  0.3, ph: 4.0 },
  { r: 3.0, spd: -0.85, y: -0.5, ph: 1.1 },
  { r: 5.2, spd:  0.30, y:  0.0, ph: 5.5 },
];
const orbLights = orbDefs.map(({ r, spd, y, ph }) => {
  const l = new THREE.PointLight(0xffffff, 5, 18);
  scene.add(l);
  return { l, r, spd, y, ph };
});

// ── TORUS KNOT ────────────────────────────────────────────────────────────
const knotGroup = new THREE.Group();
scene.add(knotGroup);

const geo  = new THREE.TorusKnotGeometry(1.3, 0.42, 180, 20, 2, 3);
const mesh = new THREE.Mesh(geo, glassMat);
knotGroup.add(mesh);

// ── RESIZE ────────────────────────────────────────────────────────────────
function onResize() {
  const W = panel.offsetWidth;
  const H = panel.offsetHeight;
  camera.aspect = W / H;
  camera.updateProjectionMatrix();
  renderer.setSize(W, H);
}
window.addEventListener('resize', onResize);
onResize();

// ── ANIMATION LOOP ────────────────────────────────────────────────────────
const clock = new THREE.Clock();

(function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Slow, gentle rotation — shows off the iridescence as angle shifts
  knotGroup.rotation.y = t * 0.20;
  knotGroup.rotation.x = Math.sin(t * 0.15) * 0.10;

  // Orbit lights cycle hue — pushes different colours into the glass
  orbLights.forEach(({ l, r, spd, y, ph }, i) => {
    const a = t * spd + ph;
    l.position.set(Math.cos(a) * r, y + Math.sin(t * 0.25 + ph) * 0.6, Math.sin(a) * r);
    l.color.setHSL(((t * 0.07 + i * 0.2) % 1), 1.0, 0.62);
  });

  renderer.render(scene, camera);
})();
</script>
